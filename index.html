<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miercuri 29.04 — Fotbal</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; margin:0; padding:15px; line-height:1.5; }
    .container { max-width: 620px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: linear-gradient(135deg, #1a73e8, #34a853); color: white; padding: 20px; text-align: center; }
    .section { padding: 18px 20px; border-bottom: 1px solid #eee; }
    button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
    .confirm { background: #1a73e8; color: white; }
    .portar { background: #d93025; color: white; }
    .random { background: #fbbc05; color: #333; font-weight: bold; }
    .admin { background: #ea4335; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .status { font-size: 1.45em; font-weight: bold; text-align: center; color: #1a73e8; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>Miercuri 29.04 — Fotbal</h1></header>

    <div class="section">
      <p>📅 Miercuri, 29 Aprilie 2026</p>
      <p>🕐 Ora 20:30 📍 Terenul 1 LPS Live</p>
    </div>

    <div class="section">
      <p><strong>Se colectează prezența</strong></p>
      <p class="status" id="total-count">0/12 confirmați</p>
    </div>

    <div class="section">
      <button onclick="adminLogin()" class="admin">🔑 Admin Panel</button>
    </div>

    <div class="section">
      <h2>📋 Confirmă prezența</h2>
      <button onclick="addNewPlayer()" class="confirm">➕ Adaugă jucător nou</button>
      <button onclick="markPresent()" class="confirm">✅ Confirmă prezența mea</button>
    </div>

    <div class="section">
      <h2>✅ Prezență Live</h2>
      <div id="prezenta"></div>
    </div>

    <div class="section">
      <button onclick="genereazaEchipe()" class="random">🎲 Generează Echipe Aleatoriu (5+1)</button>
    </div>

    <div id="echipe-section" class="section" style="display:none;"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    // ================== CONFIG FIREBASE ==================
    const firebaseConfig = {
      // // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCoByFCSCVkoKWvKm4hpijn7H9JrBahu8E",
  authDomain: "fotbalmiercuri-93d29.firebaseapp.com",
  databaseURL: "https://fotbalmiercuri-93d29-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fotbalmiercuri-93d29",
  storageBucket: "fotbalmiercuri-93d29.firebasestorage.app",
  messagingSenderId: "690306258465",
  appId: "1:690306258465:web:e8d4217e913613a4d5b560",
  measurementId: "G-H4FBVFCK39"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
      apiKey: "",
      authDomain: "",
      databaseURL: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };
    // ====================================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dataRef = db.ref('fotbal_miercuri');

    let camp = [];
    let portari = [];
    let isAdmin = false;
    const ADMIN_PASS = "1234";   // Schimbă parola!

    // Încarcă datele din Firebase
    dataRef.on('value', (snapshot) => {
      const data = snapshot.val() || { camp: [], portari: [] };
      camp = data.camp || [];
      portari = data.portari || [];
      updateUI();
    });

    function updateUI() {
      let html = `<p class="status">${camp.length + portari.length}/12 confirmați</p>`;

      if (camp.length) {
        html += `<h3>⚽ Câmp (${camp.length}/10)</h3><ul>`;
        camp.forEach(n => html += `<li>${n}</li>`);
        html += `</ul>`;
      }
      if (portari.length) {
        html += `<h3>🧤 Portari (${portari.length}/2)</h3><ul>`;
        portari.forEach(n => html += `<li>${n}</li>`);
        html += `</ul>`;
      }
      document.getElementById('prezenta').innerHTML = html;
    }

    function saveToFirebase() {
      dataRef.set({ camp: camp, portari: portari });
    }

    function adminLogin() {
      const pass = prompt("Introdu parola Admin:");
      if (pass === ADMIN_PASS) {
        isAdmin = true;
        alert("✅ Admin conectat!");
      } else alert("Parolă greșită!");
    }

    function addNewPlayer() {
      const nume = prompt("Numele jucătorului:");
      if (!nume) return;
      const estePortar = confirm("Este portar?");
      if (estePortar) {
        if (!portari.includes(nume)) portari.push(nume);
      } else {
        if (!camp.includes(nume)) camp.push(nume);
      }
      saveToFirebase();
    }

    function markPresent() {
      const nume = prompt("Introdu numele tău:");
      if (!nume) return;
      const estePortar = confirm("Ești portar?");
      if (estePortar) {
        if (!portari.includes(nume)) portari.push(nume);
      } else {
        if (!camp.includes(nume)) camp.push(nume);
      }
      saveToFirebase();
    }

    function genereazaEchipe() {
      if (camp.length < 10 || portari.length < 2) {
        return alert("Nu sunt suficienți jucători!");
      }

      const campShuf = [...camp].sort(() => Math.random() - 0.5);
      const portShuf = [...portari].sort(() => Math.random() - 0.5);

      let html = `
        <h2>🎯 Echipele Generate</h2>
        <div style="background:#f8f9fa;padding:15px;border-radius:10px;margin:10px 0;">
          <h3>🔵 Echipa 1</h3>
          <p><strong>Portar:</strong> ${portShuf[0]}</p>
          <ul>${campShuf.slice(0,5).map(n=>`<li>${n}</li>`).join('')}</ul>
        </div>
        <div style="background:#f8f9fa;padding:15px;border-radius:10px;margin:10px 0;">
          <h3>🔴 Echipa 2</h3>
          <p><strong>Portar:</strong> ${portShuf[1]}</p>
          <ul>${campShuf.slice(5,10).map(n=>`<li>${n}</li>`).join('')}</ul>
        </div>`;
      
      document.getElementById('echipe-section').innerHTML = html;
      document.getElementById('echipe-section').style.display = 'block';
    }
  </script>
</body>
</html>
