    let prezenta = {camp: [], portari: []};

    function confirma(tip) {
      const nume = document.getElementById('nume').value;
      if (!nume) return alert("Alege un nume!");

    function updateLista() {
      let html = "";
      if (prezenta.camp.length) {
        html += "<h3>⚽ Câmp</h3><ul>";
        prezenta.camp.forEach(n => html += `<li>${n}</li>`);
        html += "</ul>";

      if (prezenta.portari.length) {
        html += "<h3>🧤 Portari</h3><ul>";
