<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miercuri 29.04 — Fotbal</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; margin:0; padding:15px; }
    .container { max-width: 620px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: linear-gradient(135deg, #1a73e8, #34a853); color: white; padding: 20px; text-align: center; }
    .section { padding: 18px 20px; border-bottom: 1px solid #eee; }
    button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
    .confirm-btn { background: #1a73e8; color: white; }
    .portar-btn { background: #d93025; color: white; }
    .random-btn { background: #fbbc05; color: #333; font-weight: bold; }
    .admin-btn { background: #ea4335; font-size: 0.95em; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .status { font-size: 1.4em; font-weight: bold; text-align: center; color: #1a73e8; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>Miercuri 29.04 — Fotbal</h1></header>

    <div class="section">
      <p>📅 Miercuri, 29 Aprilie 2026</p>
      <p>🕐 Ora 20:30 📍 Terenul 1 LPS Live</p>
    </div>

    <div class="section">
      <p><strong>Se colectează prezența</strong></p>
      <p class="status" id="total">0/12 confirmați</p>
    </div>

    <!-- ADMIN LOGIN -->
    <div class="section" id="admin-login">
      <button onclick="loginAdmin()" class="admin-btn">🔑 Admin Panel</button>
    </div>

    <!-- Confirmare normală -->
    <div class="section">
      <h2>📋 Confirmă prezența</h2>
      <button onclick="addPlayerPrompt()" class="confirm-btn">➕ Adaugă jucător nou</button>
      <button onclick="confirmaPrezenta()" class="confirm-btn">✅ Confirmă prezența mea</button>
    </div>

    <!-- Prezență -->
    <div class="section">
      <h2>✅ Prezență Live</h2>
      <div id="prezenta-list"></div>
    </div>

    <div class="section">
      <button onclick="genereazaEchipe()" class="random-btn">🎲 Generează Echipe Aleatoriu (5+1)</button>
    </div>

    <div id="echipe" class="section" style="display:none;"></div>
  </div>

  <script>
    let players = { camp: [], portari: [] };
    let isAdmin = false;
    const ADMIN_PASS = "admin123"; // Schimbă parola aici!

    function updateUI() {
      let html = `<p class="status">${players.camp.length + players.portari.length}/12 confirmați</p>`;
      
      if (players.camp.length) {
        html += `<h3>⚽ Câmp (${players.camp.length}/10)</h3><ul>`;
        players.camp.forEach(p => html += `<li>${p}</li>`);
        html += `</ul>`;
      }
      if (players.portari.length) {
        html += `<h3>🧤 Portari (${players.portari.length}/2)</h3><ul>`;
        players.portari.forEach(p => html += `<li>${p}</li>`);
        html += `</ul>`;
      }
      document.getElementById('prezenta-list').innerHTML = html;
    }

    function addPlayerPrompt() {
      const nume = prompt("Introdu numele jucătorului:");
      if (!nume) return;
      const poz = confirm("Este portar?") ? "portari" : "camp";
      if (!players[poz].includes(nume)) {
        players[poz].push(nume);
        updateUI();
      }
    }

    function confirmaPrezenta() {
      const nume = prompt("Introdu numele tău:");
      if (!nume) return;
      const poz = confirm("Ești portar?") ? "portari" : "camp";
      if (!players[poz].includes(nume)) {
        players[poz].push(nume);
        updateUI();
      } else {
        alert("Deja ești confirmat!");
      }
    }

    function loginAdmin() {
      const pass = prompt("Introdu parola admin:");
      if (pass === ADMIN_PASS) {
        isAdmin = true;
        alert("✅ Ai intrat ca Admin!");
      } else {
        alert("Parolă greșită!");
      }
    }

    function genereazaEchipe() {
      if (players.camp.length < 10 || players.portari.length < 2) {
        return alert("Nu sunt suficienți jucători!");
      }

      const campShuf = [...players.camp].sort(() => Math.random() - 0.5);
      const portShuf = [...players.portari].sort(() => Math.random() - 0.5);

      let html = `
        <h2>🎯 Echipele Generate</h2>
        <div style="background:#f8f9fa;padding:15px;border-radius:10px;margin:10px 0;">
          <h3>🔵 Echipa 1</h3>
          <p><strong>Portar:</strong> ${portShuf[0]}</p>
          <ul>${campShuf.slice(0,5).map(n=>`<li>${n}</li>`).join('')}</ul>
        </div>
        <div style="background:#f8f9fa;padding:15px;border-radius:10px;margin:10px 0;">
          <h3>🔴 Echipa 2</h3>
          <p><strong>Portar:</strong> ${portShuf[1]}</p>
          <ul>${campShuf.slice(5,10).map(n=>`<li>${n}</li>`).join('')}</ul>
        </div>`;
      
      document.getElementById('echipe').innerHTML = html;
      document.getElementById('echipe').style.display = 'block';
    }

    //
